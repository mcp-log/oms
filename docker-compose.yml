services:
  postgres:
    image: postgres:16
    container_name: oms-postgres
    environment:
      POSTGRES_DB: oms_orderintake
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms -d oms_orderintake"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    container_name: oms-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

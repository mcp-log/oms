name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oms
          POSTGRES_PASSWORD: oms_secret
          POSTGRES_DB: oms_orderintake
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        ports:
          - 9092:9092

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            pkg/go.sum
            internal/orderintake/go.sum

      - name: Install dependencies
        run: |
          cd pkg && go mod download
          cd ../internal/orderintake && go mod download

      - name: Run unit tests (pkg)
        run: cd pkg && go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run unit tests (orderintake)
        run: cd internal/orderintake && go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        env:
          DATABASE_URL: postgres://oms:oms_secret@localhost:5432/oms_orderintake?sslmode=disable
          KAFKA_BROKERS: localhost:9092

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./pkg/coverage.txt,./internal/orderintake/coverage.txt
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            pkg/go.sum
            internal/orderintake/go.sum

      - name: Install dependencies
        run: |
          cd pkg && go mod download
          cd ../internal/orderintake && go mod download

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint (pkg)
        run: |
          cd pkg
          golangci-lint run --timeout=5m ./...

      - name: Run golangci-lint (orderintake)
        run: |
          cd internal/orderintake
          golangci-lint run --timeout=5m ./...

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: oms:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          outputs: type=docker,dest=/tmp/oms-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: oms-docker-image
          path: /tmp/oms-image.tar
          retention-days: 7
